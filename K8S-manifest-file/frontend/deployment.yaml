apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: usermanagement

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: swagnik10/usermanagement-frontend:v1

          ports:
            - containerPort: 80

          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"