apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: sqlserver
  namespace: usermanagement

spec:
  serviceName: sqlserver

  replicas: 1

  selector:
    matchLabels:
      app: sqlserver

  template:
    metadata:
      labels:
        app: sqlserver

    spec:
      containers:
        - name: sqlserver

          image: mcr.microsoft.com/mssql/server:2022-latest

          ports:
            - containerPort: 1433

          env:
            - name: ACCEPT_EULA
              value: "Y"

            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SA_PASSWORD

          volumeMounts:
            - name: sqlserver-storage
              mountPath: /var/opt/mssql

      volumes:
        - name: sqlserver-storage
          persistentVolumeClaim:
            claimName: sqlserver-pvc